services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=imse24
  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=root
      - ME_CONFIG_MONGODB_ADMINPASSWORD=imse24
      - ME_CONFIG_MONGODB_SERVER=mongodb
  mariadb:
    image: mariadb:11.3
    container_name: mariadb
    ports:
      - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=imse24
      - MARIADB_DATABASE=topic_exchange
    volumes:
      - mariadb-data:/var/lib/mysql
volumes:
  mariadb-data:
  mongodb-data:
networks:
  default:
    name: mongodb_network
