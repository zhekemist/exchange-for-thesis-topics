spring:
  application:
    name: backend
  profiles:
    active: mariadb, suppress-mongodb
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    rest:
      base-path: /api
dbs:
  maria:
    host: 127.0.0.1
    port: 3306
    databaseName: topic_exchange
    datasource:
      url: jdbc:mariadb://${dbs.maria.host}:${dbs.maria.port}/${dbs.maria.databaseName}
      username: root
      password: imse24
  mongo:
    host: 127.0.0.1
    port: 27017
    datasource:
      url: mongodb://${dbs.mongo.host}:${dbs.mongo.port}
---
# Disable MongoDB during development
spring:
  config:
    activate:
      on-profile: suppress-mongodb
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
