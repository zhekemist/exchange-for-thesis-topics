<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Topic Exchange</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <!-- Local Scripts -->
    <script src="profile.js" type="module"></script>

    <!-- Bootstrap -->
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" rel="stylesheet">
    <script crossorigin="anonymous" defer
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Alpine JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Local Stylesheet-->
    <link href="style.css" rel="stylesheet">
</head>

<body x-data="{activeTopicIndex: null}">
<div x-data="userManager">
    <nav class="navbar navbar-expand-md bg-body-secondary">
        <a @click="window.location.href='index.html'" class="navbar-brand">
            <img class="img-fluid uni-logo" src="assets/uniLogo.png">
            Thesis Topic Exchange
        </a>
        <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item mx-2">
                <a class="btn btn-secondary" href="index.html"><i class="bi-caret-left-fill"></i> Go Back</a>
            </li>
        </ul>
    </nav>
    <template x-if="currentUser.isStudent">
        <div class="container mt-5">
            <h2>Your Topic Choices</h2>
            <br>
            <div class="accordion">
                <template :key="index" x-for="(topic, index) in currentUser.topicChoices">
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button :aria-controls="'topic-accordion-element' + index"
                                    :aria-expanded="activeTopicIndex === index ? 'true' : 'false'"
                                    :class="{ 'collapsed': activeTopicIndex !== index }"
                                    @click="activeTopicIndex = activeTopicIndex === index ? null : index"
                                    class="accordion-button"
                                    type="button">
                                <span x-text="topic.topic.title"></span>
                            </button>
                        </h2>
                        <div :class="{ 'show': activeTopicIndex === index }"
                             :id="'topic-accordion-element' + index"
                             class="accordion-collapse collapse">
                            <div class="accordion-body">
                                <div class="container">
                                    <div class="row">
                                        <div class="col-md-10">
                                            <div class="row">
                                                <div class="col">
                                                    <p x-text="'Instructor: ' + topic.topic.instructor.name"></p>
                                                </div>
                                            </div>
                                            <div class="row">
                                                <div class="col">
                                                    <p x-text="'Description: ' + topic.topic.description"></p>
                                                </div>
                                            </div>
                                            <div class="row" x-show="topic.topic.categories.length!=0">
                                                <div class="col">
                                                    Categories:
                                                    <div style='margin-left: 30px'>
                                                        <template
                                                                :key="index"
                                                                x-for="(category, index) in topic.topic.categories">
                                                            <li x-text="category.name"></li>
                                                        </template>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-6 col-md-2 d-flex align-items-center justify-content-center">
                                            <p>
                                                Priority points: <span x-text="topic.priorityPoints"></span>
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </template>
    <template x-if="!currentUser.isStudent">
        <div class="container mt-5" x-data="{activeTopicIndex: null}">
            <h2>Your Offered Topics</h2>
            <br>
            <div class="accordion">
                <template :key="index" x-for="(topic, index) in $store.getTopicsOfInstructor(currentUser.idLink)">
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button :aria-controls="'topic-accordion-element' + index"
                                    :aria-expanded="activeTopicIndex === index ? 'true' : 'false'"
                                    :class="{ 'collapsed': activeTopicIndex !== index }"
                                    @click="activeTopicIndex = activeTopicIndex === index ? null : index"
                                    class="accordion-button"
                                    type="button">
                                <span x-text="topic.title"></span>
                            </button>
                        </h2>
                        <div :class="{ 'show': activeTopicIndex === index }"
                             :id="'topic-accordion-element' + index"
                             class="accordion-collapse collapse">
                            <div class="accordion-body">
                                <div class="container">
                                    <div class="row">
                                        <div class="col-md-10">
                                            <div class="row">
                                                <div class="col">
                                                    <p x-text="'Description: ' + topic.description"></p>
                                                </div>
                                            </div>
                                            <div class="row" x-show="topic.categories.length!=0">
                                                <div class="col">
                                                    Categories:
                                                    <div style='margin-left: 30px'>
                                                        <template
                                                                :key="index"
                                                                x-for="(category, index) in topic.categories">
                                                            <li x-text="category.name"></li>
                                                        </template>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </template>
</div>
</body>
</html>
