<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Topic Exchange</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <!-- Local Scripts -->
    <script src="index.js" type="module"></script>

    <!-- Bootstrap -->
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" rel="stylesheet">
    <script crossorigin="anonymous" defer
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Alpine JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Local Stylesheet-->
    <link href="style.css" rel="stylesheet">
</head>

<body>
<div x-data="userManager">
    <nav class="navbar navbar-expand-md bg-body-secondary">
        <a class="navbar-brand">
            <img class="img-fluid uni-logo" src="assets/uniLogo.png">
            Thesis Topic Exchange
        </a>
        <ul class="navbar-nav ms-auto align-items-center">
            <template x-if="usersLoaded && !currentUser.isStudent">
                <li class="nav-item px-2">
                    <a class="btn btn-primary" href="create-topic.html">Create new Topic</a>
                </li>
            </template>
            <template x-if="usersLoaded">
                <li class="nav-item px-2">
                    <div class="dropdown">
                        <button aria-expanded="false" class="btn btn-secondary dropdown-toggle"
                                data-bs-toggle="dropdown"
                                id="changeUserDropDown" type="button" x-text="currentUser.name">
                        </button>
                        <ul aria-labelledby="changeUserDropDown" class="dropdown-menu dropdown-menu-end">
                            <template x-for="(user, index) in users">
                                <li><a @click="currentUser = index" class="dropdown-item" href="#"
                                       x-text="user.name"></a></li>
                            </template>
                        </ul>
                    </div>
                </li>
            </template>
            <li class="nav-item px-2">
                <a class="btn bi-person-circle user-icon text-secondary" href="profile.html"></a>
            </li>
            <li class="nav-item">
                <button class="btn bi-gear-wide-connected user-icon text-secondary"
                        data-bs-target="#specialActionsModal"
                        data-bs-toggle="modal"
                        type="button"></button>
            </li>
        </ul>
    </nav>
    <div class="container mt-5" x-data="topicData">
        <h2>Thesis Topics</h2>
        <br>
        <div class="accordion">
            <template :key="index" x-for="(topic, index) in topics">
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button :aria-controls="'topic-accordion-element' + index"
                                :aria-expanded="activeTopicIndex === index ? 'true' : 'false'"
                                :class="{ 'collapsed': activeTopicIndex !== index }"
                                @click="activeTopicIndex = activeTopicIndex === index ? null : index"
                                class="accordion-button"
                                type="button">
                            <span x-text="topic.title"></span>
                        </button>
                    </h2>
                    <div :class="{ 'show': activeTopicIndex === index }"
                         :id="'topic-accordion-element' + index"
                         class="accordion-collapse collapse">
                        <div class="accordion-body">
                            <div class="container">
                                <div class="row">
                                    <div class="col-md-10">
                                        <div class="row">
                                            <div class="col">
                                                <p x-text="'Instructor: ' + topic.instructor.name"></p>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col">
                                                <p x-text="'Description: ' + topic.description"></p>
                                            </div>
                                        </div>
                                        <div class="row" x-show="topic.categories.length!=0">
                                            <div class="col">
                                                Categories:
                                                <div style='margin-left: 30px'>
                                                    <template :key="index"
                                                              x-for="(category, index) in topic.categories">
                                                        <li x-text="category.name"></li>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-6 col-md-2 d-flex align-items-center justify-content-center">
                                        <template x-if="currentUser.isStudent==true">
                                            <button @click="activeTopicModal = index" class="applyButton">Apply</button>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>


        <template :key="'modal-' + index" x-for="(topic, index) in topics">
            <div :class="{ 'show d-block': activeTopicModal === index }" aria-hidden="true"
                 class="modal special-modal">
                <div class="modal-dialog">
                    <template x-if="currentUser.isStudent==true && activeTopicModal==index">
                        <div class="modal-content" x-data="{choosenPrio: 0, remainingPrio: 0, choiceExists: true}"
                             x-effect="remainingPrio = await $store.getRemainingPriorityPoints(currentUser.idLink);
                                choiceExists = await $store.checkIfChoiceAlreadyExists(currentUser.idLink, currentTopic)">
                            <div class="modal-header">
                                <h5 class="modal-title">
                                    <template x-if="remainingPrio>0 && !choiceExists">
                                        <span x-text="topic.title"></span>
                                    </template>
                                    <template x-if="remainingPrio<=0 || choiceExists">
                                        <span>Error</span>
                                    </template>
                                </h5>
                                <button @click="activeTopicModal = null" aria-label="Close" class="btn-close"
                                        type="button"></button>
                            </div>
                            <template x-if="remainingPrio>0 && !choiceExists">
                                <div class="modal-body">
                                    <form action="javascript:void(0);">
                                        <div class="form-group">
                                            <label :for="'priority-points' + index">Enter the number of priority
                                                points you want to set:</label>
                                            <template x-if="usersLoaded">
                                                <input :id="'priority-points' + index" :max="remainingPrio"
                                                       class="form-control"
                                                       min="1"
                                                       type="number" x-model.number="choosenPrio">
                                            </template>
                                            <template x-if="activeTopicModal == index">
                                                <div class="form-text" id="priorityPointsInformation">
                                                    You have
                                                    <span x-text="remainingPrio"></span>
                                                    points left.
                                                </div>
                                            </template>
                                        </div>
                                        <br>
                                        <div class="d-flex justify-content-end">
                                            <button @click="$store.addChoiceAndRedirect(
                                                currentUser.idLink, currentTopic.idLink, choosenPrio, 'profile.html');
                                                activeTopicModal = null;" class="applyButton"
                                                    type="button">
                                                Submit
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </template>
                            <template x-if="choiceExists && remainingPrio>0">
                                <div class="modal-body">
                                    You can not apply for the same topic twice, choose a different one.
                                </div>
                            </template>
                            <template x-if="remainingPrio<=0">
                                <div class="modal-body">
                                    You can no longer apply for Thesis Topics as you have no priority points left.
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>
    <div class="modal" id="specialActionsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Special actions</h5>
                    <button aria-label="Close" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <div class="modal-body d-flex justify-content-center flex-column">
                    <button class="btn btn-warning my-2">Migrate to NoSQL</button>
                    <button class="btn btn-primary my-2">Show [Name von Report 1]</button>
                    <button class="btn btn-primary my-2">Show [Name von Report 2]</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
