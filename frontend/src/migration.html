<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Topic Exchange</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <!-- Local Scripts -->
    <script src="migration.js" type="module"></script>

    <!-- Bootstrap -->
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" rel="stylesheet">
    <script crossorigin="anonymous" defer
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Alpine JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Local Stylesheet-->
    <link href="style.css" rel="stylesheet">
</head>

<body>
<div>
    <nav class="navbar navbar-expand-md bg-body-secondary">
        <a class="navbar-brand">
            <img class="img-fluid uni-logo" src="assets/uniLogo.png">
            Thesis Topic Exchange
        </a>
    </nav>
    <div class="container mt-5 d-flex justify-content-center align-items-center" x-data="countdown" x-init="run()">
        <div class="card d-flex justify-content-center align-items-center w-75 h-50 p-5">
            <div class="spinner-border text-primary m-3" style="width: 5rem; height: 5rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <h1>Migrating. Please wait!</h1>
            <template x-if="!timeoutHandled">
                <h4 class="text-secondary">Rechecking if backend is up in <i x-text="timeLeft"></i> seconds
                    ...</h4>
            </template>
            <template x-if="!timeoutHandled">
                <button class="btn btn-outline-secondary mt-5" @click="setTime(0)">Recheck now</button>
            </template>
            <template x-if="timeoutHandled">
                <h4 class="text-secondary">Rechecking if backend is up ...</h4>
            </template>
        </div>
    </div>
</div>
</body>
</html>
