<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Topic Exchange</title>

    <!-- Local Scripts -->
    <script src="create-topic.js" type="module"></script>

    <!-- Bootstrap -->
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" rel="stylesheet">

    <script defer src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script crossorigin="anonymous" defer
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Alpine JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Local Stylesheet-->
    <link href="style.css" rel="stylesheet">

    <script defer>
        const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
        const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl))
    </script>
</head>
<body>
<div x-data="topicCreationForm">
    <nav class="navbar navbar-expand-md bg-body-secondary">
        <a @click="window.location.href='index.html'" class="navbar-brand">
            <img class="img-fluid uni-logo" src="assets/uniLogo.png">
            Thesis Topic Exchange
        </a>
        <ul class="navbar-nav ms-auto align-items-center" x-data="{userManager}">
            <li class="navbar-item">
                <button :disabled="!titleSelected" class="btn btn-primary mx-2" form="creationForm" type="submit">
                    Submit Topic
                </button>
            </li>
            <li class="navbar-item">
                <a class="btn btn-danger" href="index.html">Discard Topic</a>
            </li>
        </ul>
    </nav>
    <div class="container mt-5">
        <h2>Create a new Thesis Topic</h2>
        <br>
        <div class="card">
            <div class="card-body" x-data="userManager">
                <form @submit="submitTopic(currentUser.idLink)" action="javascript:void(0);" id="creationForm"
                      x-init="form = $el">
                    <div>
                        <h5>Topic Title</h5>
                        <div class="input-group has-validation">
                            <input :class="titleSelected ? 'is-valid' : (titleInvalid ? 'is-invalid' : '')"
                                   :disabled="titleSelected"
                                   aria-describedby="validationTopicTitleFeedback"
                                   class="form-control"
                                   placeholder="Enter the title ..." required type="text" x-model="title">
                            <button :disabled="titleSelected" @click="validateTitle()" class="btn btn-primary"
                                    type="submit">
                                Check Availabilty
                            </button>
                            <div class="invalid-feedback" id="validationTopicTitleFeedback">
                                Topic title exists already! Please choose another.
                            </div>
                        </div>
                    </div>
                    <div class="mt-3">
                        <h5>Description</h5>
                        <textarea :disabled="!titleSelected" class="form-control" placeholder="Enter a description ..."
                                  required x-model="description"></textarea>
                    </div>
                    <div class="mt-3">
                        <h5>Categories</h5>
                        <div class="input-group">
                            <input :disabled="!titleSelected" class="form-control"
                                   placeholder="Search for categories ..."
                                   type="text" x-model="categorySearch">

                            <span @click="clearSearch()" class="input-group-text"
                                  x-show="categoryResults != null">
                                <i class="bi-x-lg"></i>
                            </span>
                            <button :disabled="!titleSelected" @click="searchCategories()" class="btn btn-primary"
                                    type="button">
                                <i class="bi-search me-1"></i>
                                Search
                            </button>
                        </div>
                        <div class="card text-bg-light my-2">
                            <div class="card-body text-secondary">
                                <template x-if="categoryResults == null">
                                    <div>Search results will appear here ...</div>
                                </template>
                                <template x-if="categoryResults != null && Object.keys(categoryResults).length === 0">
                                    <div>No matching categories.</div>
                                </template>
                                <template x-if="categoryResults != null && Object.keys(categoryResults).length > 0">
                                    <ul class="list-group">
                                        <template x-for="(category, idLink) in categoryResults">
                                            <li class="list-group-item d-flex w-100 justify-content-between align-items-center">
                                                <div>
                                                    <div x-text="category.name"></div>
                                                    <small x-text="category.shortDescription"></small>
                                                </div>
                                                <button @click="selectCategory(idLink)"
                                                        class="btn btn-sm btn-secondary"
                                                        type="button"
                                                >Add
                                                </button>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                            </div>
                        </div>
                        <ul class="list-group">
                            <template x-for="(category, idLink) in selectedCategories">
                                <li class="list-group-item d-flex w-100 justify-content-between align-items-center">
                                    <div>
                                        <div x-text="category.name"></div>
                                        <small x-text="category.shortDescription"></small>
                                    </div>
                                    <button @click="unselectCategory(category.idLink)"
                                            class="btn-close"
                                            type="button"
                                    >
                                    </button>
                                </li>
                            </template>
                        </ul>
                    </div>
                    <div class="mt-3">
                        <h5>Literature References</h5>
                        <ul class="list-group my-3">
                            <template x-for="(reference, referenceNr) in literatureReferences">
                                <li class="list-group-item">
                                    <div class="d-flex w-100 justify-content-between align-items-center">
                                        <h5 x-text="reference.title">The Literature Reference</h5>
                                        <button @click="deleteReference(referenceNr)" class="btn-close"
                                                type="button"></button>
                                    </div>
                                    <table class="table-sm">
                                        <tbody>
                                        <tr>
                                            <th scope="row">Author</th>
                                            <td x-text="reference.author || 'None'"></td>
                                        </tr>
                                        <tr>
                                            <th scope="row">Year</th>
                                            <td x-text="reference.year || 'None'"></td>
                                        </tr>
                                        <tr>
                                            <th scope="row">Link</th>
                                            <td><a x-bind:href="reference.link" x-text="reference.link || 'None'"></a>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </li>
                            </template>
                        </ul>
                        <button :disabled="!titleSelected" class="btn btn-sm btn-primary"
                                data-bs-target="#referencesModal"
                                data-bs-toggle="modal" type="button">
                            <i class="bi-plus-lg"></i> Add Reference
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div class="modal" data-bs-backdrop="static" data-bs-keyboard="false" id="referencesModal" st tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-body">
                    <form action="javascript:void(0)" id="referenceForm">
                        <label class="form-label" for="referenceTitleInput">Title</label>
                        <input class="form-control" id="referenceTitleInput"
                               placeholder="Enter title ..."
                               required type="text" x-model="referenceTitle">
                        <label class="form-label" for="referenceAuthorInput">Author</label>
                        <input class="form-control" id="referenceAuthorInput"
                               placeholder="Enter author ..."
                               type="text" x-model="referenceAuthor">
                        <label class="form-label" for="referenceYearInput">Year</label>
                        <input class="form-control" id="referenceYearInput"
                               max="2024"
                               placeholder="Enter year ..." type="number" x-model="referenceYear">
                        <label class="form-label" for="referenceLinkInput">Link</label>
                        <input class="form-control" id="referenceLinkInput"
                               placeholder="Enter title of reference ..."
                               type="url" x-model="referenceLink">
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-danger" data-bs-dismiss="modal" form="referenceForm" type="reset">Discard
                    </button>
                    <button @click="saveReference()" class="btn btn-primary" form="referenceForm" type="submit">Save
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
