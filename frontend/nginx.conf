events {
}

http {

    include /etc/nginx/mime.types;
    types {
      application/javascript mjs;
    }

    resolver 127.0.0.11;

    server {
        listen 80;
        listen 443 ssl;
        ssl_certificate /home/topic-exchange/security/ssl-certificate.pem;
        ssl_certificate_key /home/topic-exchange/security/ssl-key.pem;

        root /home/topic-exchange/content;

        location /api/ {
            proxy_pass http://backend/api/;
        }
    }
}
