<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Topic Exchange</title>

    <!-- Local Scripts -->
    <script src="index.js" type="module"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Alpine JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Local Stylesheet-->
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div x-data="userManager">
    <nav class="navbar navbar-expand-md bg-body-secondary">
        <a class="navbar-brand">
            <img src="assets/uniLogo.png" class="img-fluid uni-logo">
            Thesis Topic Exchange
        </a>
        <ul class="navbar-nav ms-auto align-items-center">
            <template x-if="usersLoaded">
                <li class="nav-item">
                    <div class="dropdown">
                        <button class="btn btn-secondary dropdown-toggle" type="button" id="changeUserDropDown"
                                data-bs-toggle="dropdown" aria-expanded="false" x-text="currentUser.name">
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="changeUserDropDown">
                            <template x-for="(user, index) in users">
                                <li><a class="dropdown-item" href="#" @click="currentUser = index"
                                       x-text="user.name"></a></li>
                            </template>
                        </ul>
                    </div>
                </li>
            </template>
            <li class="nav-item">
                <a class="btn bi-person-circle user-icon text-secondary" href="profile.html"></a>
            </li>
        </ul>
    </nav>
    <div x-data="topicData" class="container mt-5">
        <h2>Thesis Topics</h2>
        <br>
        <div class="accordion">
            <template x-for="(topic, index) in topics" :key="index">
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button" type="button"
                                @click="activeTopicIndex = activeTopicIndex === index ? null : index"
                                :class="{ 'collapsed': activeTopicIndex !== index }"
                                :aria-expanded="activeTopicIndex === index ? 'true' : 'false'"
                                :aria-controls="'topic-accordion-element' + index">
                            <span x-text="topic.title"></span>
                        </button>
                    </h2>
                    <div :id="'topic-accordion-element' + index"
                         class="accordion-collapse collapse"
                         :class="{ 'show': activeTopicIndex === index }">
                        <div class="accordion-body">
                            <div class="container">
                                <div class="row">
                                    <div class="col-md-10">
                                        <div class="row">
                                            <div class="col">
                                                <p x-text="'Instructor: ' + topic.instructor.name"></p>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col">
                                                <p x-text="'Description: ' + topic.description"></p>
                                            </div>
                                        </div>
                                        <div class="row" x-show="topic.categories.length!=0">
                                            <div class="col">
                                                Categories:
                                                <div style='margin-left: 30px'>
                                                    <template x-for="(category, index) in topic.categories"
                                                              :key="index">
                                                        <li x-text="category.name"></li>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-6 col-md-2 d-flex align-items-center justify-content-center">
                                        <template x-if="currentUser.isStudent==true">
                                            <button class="applyButton" @click="activeTopicModal = index">Apply</button>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <template x-for="(topic, index) in topics" :key="'modal-' + index">
            <div class="modal" :class="{ 'show d-block': activeTopicModal === index }" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">
                                <span x-text="topic.title"></span>
                            </h5>
                            <button type="button" class="btn-close" @click="activeTopicModal = null"
                                    aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <template x-if="currentUser.isStudent==true">
                                <form action="profile.html" x-data="{choosenPrio: 0, remainingPrio: 0}"
                                      x-effect="remainingPrio = $store.getRemainingPriorityPoints(currentUser.idLink)">
                                    <div class="form-group">
                                        <label :for="'priority-points' + index">Enter the number of priority points you
                                            want to set:</label>
                                        <template x-if="usersLoaded">
                                            <input type="number" class="form-control" :id="'priority-points' + index"
                                                   min="1" :max="remainingPrio"
                                                   x-model.number="choosenPrio" required>
                                        </template>
                                        <template x-if="activeTopicModal == index">
                                            <div id="priorityPointsInformation" class="form-text">
                                                You have
                                                <span x-text="remainingPrio"></span>
                                                points left.
                                            </div>
                                        </template>
                                    </div>
                                    <br>
                                    <div class="d-flex justify-content-end">
                                        <button class="applyButton" type="button"
                                                @click="$store.addChoice(currentUser.idLink, currentTopic.idLink, choosenPrio);
                                                activeTopicModal = null">
                                            Submit
                                        </button>
                                    </div>
                                </form>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>
</body>
</html>
